<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="neonGrad" x1="20" y1="20" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ff87"/>
      <stop offset="45%" stop-color="#60efff"/>
      <stop offset="100%" stop-color="#ff0080"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with neon border -->
  <circle cx="90" cy="90" r="78" fill="#050507" stroke="url(#neonGrad)" stroke-width="9"/>
  <circle cx="90" cy="90" r="78" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.15"/>
  
  <!-- Stylized fan blade / neural core -->
  <g filter="url(#glow)">
    <!-- Central core -->
    <circle cx="90" cy="90" r="22" fill="#050507" stroke="#00ff87" stroke-width="5"/>
    <circle cx="90" cy="90" r="11" fill="#ffcc00"/>
    
    <!-- Fan blades / neural connections -->
    <path d="M90 42 Q115 68 90 90" fill="none" stroke="#60efff" stroke-width="7" stroke-linecap="round"/>
    <path d="M90 42 Q65 68 90 90" fill="none" stroke="#60efff" stroke-width="7" stroke-linecap="round"/>
    
    <path d="M138 90 Q112 115 90 90" fill="none" stroke="#ff0080" stroke-width="7" stroke-linecap="round"/>
    <path d="M42 90 Q68 115 90 90" fill="none" stroke="#ff0080" stroke-width="7" stroke-linecap="round"/>
    
    <!-- Diagonal neural traces -->
    <path d="M55 55 Q72 72 90 90" fill="none" stroke="#00ff87" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M125 55 Q108 72 90 90" fill="none" stroke="#00ff87" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M55 125 Q72 108 90 90" fill="none" stroke="#ffcc00" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M125 125 Q108 108 90 90" fill="none" stroke="#ffcc00" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  
  <!-- QA shield / check accent -->
  <path d="M90 118 L78 130 L102 130 Z" fill="#00ff87"/>
  <circle cx="90" cy="90" r="6" fill="#050507"/>
</svg>